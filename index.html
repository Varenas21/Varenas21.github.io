<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <link rel="stylesheet" href="/root/CSS/index.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/root/Javascript/index.js"></script>
    <title> Valeria Arenas Portfolio 2024</title>
</head>

<body class="bg-gray-100">

    <!-- Navbar -->
    <nav class="bg-white shadow fixed w-full z-10">
        <div class="container mx-auto px-4">
            <div class="flex items-center justify-between h-16">
                <div class="flex-shrink-0">
                    <a href="#" class="text-xl font-bold text-gray-900">MyPortfolio</a>
                </div>
                <div class="hidden md:flex md:space-x-8">
                    <a href="#about" class="text-gray-700 hover:text-gray-900">About Me</a>
                    <a href="#projects" class="text-gray-700 hover:text-gray-900">Projects</a>
                    <a href="#contact" class="text-gray-700 hover:text-gray-900">Contact</a>
                </div>
                <div class="md:hidden">
                    <button class="text-gray-700 hover:text-gray-900 focus:outline-none focus:text-gray-900" aria-label="Toggle navigation">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
                        </svg>
                    </button>
                </div>
            </div>
        </div>
    </nav>
    
    <!-- About Me Section -->
    <section id="about" class="py-16">
        <div class="container mx-auto text-center">
            <h2 class="text-3xl font-semibold mb-4">About Me</h2>
            <p class="text-gray-700">Hi, I'm [Your Name], a [Your Profession].</p>
        </div>
    </section>
    
    <!-- Projects Section -->
    <section id="projects" class="py-16 bg-white">
        <div class="container mx-auto text-center">
            <h2 class="text-3xl font-semibold mb-4">Projects</h2>
            <!-- Add your project details here -->
        </div>
    </section>
    
    <!-- Contact Section -->
    <section id="contact" class="py-16">
        <div class="container mx-auto text-center">
            <h2 class="text-3xl font-semibold mb-4">Contact</h2>
            <!-- Add your contact details or form here -->
        </div>
    </section>
    
    <!-- Footer -->
    <footer class="bg-gray-800 text-white py-4">
        <div class="container mx-auto text-center">
            <p>&copy; 2024 MyPortfolio. All rights reserved.</p>
        </div>
    </footer>
    
    <script>
        // Toggle the navbar menu on small screens
        document.querySelector('button[aria-label="Toggle navigation"]').addEventListener('click', () => {
            document.querySelector('.md\\:hidden').classList.toggle('hidden');
        });
    </script>
    </body>
