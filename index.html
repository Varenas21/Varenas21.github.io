<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <link rel="stylesheet" href="/root/CSS/index.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/root/Javascript/index.js"></script>
    <title> Valeria Arenas Portfolio 2024</title>
</head>

<body class="text-white" style="background-color:#131618;">

    <!-- Navbar -->
    <nav class="bg-white shadow fixed w-full z-10">
        <div class="container mx-auto px-4">
            <div class="flex items-center justify-between h-16">
                <div class="flex-shrink-0">
                    <a href="/index.html" class="text-xl font-bold text-gray-900">Valeria Arenas</a>
                </div>
                <div class="hidden md:flex md:space-x-8">
                    <a href="./root/View/AboutMe.html" class="text-gray-700 hover:text-gray-900">About Me</a>
                    <a href="/root/View/Experience.html" class="text-gray-700 hover:text-gray-900">Projects</a>
                </div>
                <div class="md:hidden">
                    <button class="text-gray-700 hover:text-gray-900 focus:outline-none focus:text-gray-900"
                        aria-label="Toggle navigation">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                            xmlns="http://www.w3.org/2000/svg">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M4 6h16M4 12h16M4 18h16"></path>
                        </svg>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <!-- About Me Section -->
    <section id="about" class="relative h-96 lg:h-[36rem]">
        <div class="container mx-auto text-center">
            <img src="./root/Images/MainBanner.png" alt="MainBanner"
                class="absolute inset-0 w-full h-full object-cover">
            <div class="absolute inset-0 bg-black bg-opacity-0 flex flex-col items-center justify-center space-y-4">
                <h1 class="text-white text-3xl font-bold tracking-widest">Hi, I'm Valeria Arenas</h1>
                <h4 class="text-white text-2xl font-bold tracking-widest">Software Engineer | Game Developer</h4>
                <img src="./root/Images/PfpCasual.jpg" class="mx-auto rounded-full w-80 h-80 mb-4 border-solid border-4 border-white">
            </div>

        </div>
    </section>

    <!-- Projects Section -->
    <section id="projects" class="py-16 ">
        <section id="projects" class="py-16 ">
            <div class="container mx-auto text-center">
                <h2 class="text-3xl font-semibold mb-4">Projects</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-60">
                    <!-- Card 1 -->
                    <a href="./root/View/Tasko.html" class="relative block overflow-hidden rounded-lg shadow-lg">
                        <img src="./root/Images/Logo.png" alt="Tasko" class="w-full h-full object-cover">
                        <div class="absolute inset-0 bg-black bg-opacity-50 flex items-center justify-center">
                            <h3 class="text-white text-xl font-bold">Tasko</h3>
                        </div>
                    </a>
                    <!-- Card 2 -->
                    <a href="./root/View/LightGone.html" class="relative block overflow-hidden rounded-lg shadow-lg">
                        <img src="./root/Images/LightGoneV.png" alt="LightGone" class="w-full h-full object-cover">
                        <div class="absolute inset-0 bg-black bg-opacity-50 flex items-center justify-center">
                            <h3 class="text-white text-xl font-bold">LightGone</h3>
                        </div>
                    </a>
                </div>
            </div>
        </section>

        <!-- Contact Section -->
        <section id="contact" class="py-16">
            <div class="container mx-auto text-center">
                <h2 class="text-3xl font-semibold mb-4">Contact</h2>
                <div class="flex justify-center space-x-60">
                    <div class="flex flex-col items-center">
                        <img src="./root/Images/githubLogo.png" alt="Github" class="w-48 h-48 object-cover ">
                    </div>
                    <div class="flex flex-col items-center">
                        <img src="./root/Images/LinkedInLogo.png" alt="LinkedIn"
                            class="w-48 h-48 object-cover rounded-md">
                    </div>
                </div>

            </div>
        </section>

        <!-- Footer -->
        <footer class="bg-gray-800 text-white py-4">
            <div class="container mx-auto text-center">
                <p>&copy; 2024 Valeria Arenas Portfolio. All rights reserved.</p>
            </div>
        </footer>

        <script>
            // Toggle the navbar menu on small screens
            document.querySelector('button[aria-label="Toggle navigation"]').addEventListener('click', () => {
                document.querySelector('.md\\:hidden').classList.toggle('hidden');
            });
        </script>
</body>
